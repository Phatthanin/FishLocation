<style>
  :root{
    --deep:      #0B2A2E;
    --deep-2:    #123A3D;
    --paper:     #F1E8D6;
    --paper-2:   #E8DCC4;
    --ink:       #16302B;
    --ink-soft:  #3E5751;
    --copper:    #B5651D;
    --copper-lt: #D98E4A;
    --seafoam:   #4C8577;
    --easy:      #4C8577;
    --mid:       #B5651D;
    --hard:      #8B3A3A;
    --line:      rgba(22,48,43,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:var(--deep);font-family:'IBM Plex Sans Thai',sans-serif;color:var(--ink);}
  .app{height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  /* ---------- Header ---------- */
  header{
    background:
      radial-gradient(circle at 12% 30%, rgba(217,142,74,0.10), transparent 40%),
      repeating-linear-gradient(0deg, rgba(241,232,214,0.05) 0px, rgba(241,232,214,0.05) 1px, transparent 1px, transparent 26px),
      var(--deep);
    color:var(--paper);
    padding:18px 28px 16px;
    display:flex;align-items:center;justify-content:space-between;
    border-bottom:none;
    flex-shrink:0;
  }
  .brand{display:flex;align-items:center;gap:12px;}
  .brand svg{flex-shrink:0;}
  .brand h1{
    font-family:'Fraunces',serif;font-weight:600;font-size:22px;letter-spacing:0.3px;margin:0;color:var(--paper);
  }
  .brand p{margin:2px 0 0;font-size:12px;color:rgba(241,232,214,0.55);letter-spacing:0.5px;font-family:'IBM Plex Mono',monospace;}
  .header-right{display:flex;align-items:center;gap:20px;}
  .legend{display:flex;gap:16px;}
  .legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(241,232,214,0.75);}
  .legend-dot{width:10px;height:10px;border-radius:50%;box-shadow:0 0 0 3px currentColor inset;}

  /* ---------- Layout ---------- */
  .body-wrap{flex:1;display:flex;min-height:0;}
  .sidebar{
    width:340px;flex-shrink:0;background:var(--paper);
    display:flex;flex-direction:column;border-right:1px solid var(--line);
  }
  .filters{padding:16px 16px 10px;border-bottom:1px solid var(--line);}
  .filters .label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    border:1px solid var(--line);background:var(--paper-2);color:var(--ink);
    padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .15s ease;
    font-weight:500;
  }
  .chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .chip[data-level="easy"].active{background:var(--easy);border-color:var(--easy);}
  .chip[data-level="mid"].active{background:var(--mid);border-color:var(--mid);}
  .chip[data-level="hard"].active{background:var(--hard);border-color:var(--hard);}

  .locate-box{padding:0 16px 14px;border-bottom:1px solid var(--line);}
  .locate-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--deep);color:var(--paper);border:none;padding:10px;border-radius:8px;
    font-size:13px;font-weight:600;cursor:pointer;font-family:'IBM Plex Sans Thai',sans-serif;
    transition:background .15s ease;
  }
  .locate-btn:hover{background:var(--deep-2);}
  .locate-btn:disabled{opacity:.6;cursor:progress;}
  .locate-status{font-size:11.5px;color:var(--ink-soft);margin-top:8px;line-height:1.5;}
  .user-marker{position:relative;width:20px;height:20px;}
  .user-marker .pulse{
    position:absolute;inset:0;border-radius:50%;background:#2A6FDB;opacity:.35;
    animation:pulse 1.8s ease-out infinite;
  }
  .user-marker .dot{
    position:absolute;top:5px;left:5px;width:10px;height:10px;border-radius:50%;
    background:#2A6FDB;box-shadow:0 0 0 2px #fff;
  }
  @keyframes pulse{
    0%{transform:scale(0.4);opacity:.5;}
    100%{transform:scale(2.2);opacity:0;}
  }

  .near-me{padding:14px 16px 4px;border-bottom:1px solid var(--line);}
  .near-me .label{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:8px;}
  .near-item{
    display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 10px;background:#fff;
    border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:12.5px;
  }
  .near-item:hover{border-color:var(--copper);}
  .near-item .dist{font-family:'IBM Plex Mono',monospace;color:var(--ink-soft);font-size:11.5px;white-space:nowrap;}

  .spot-list{flex:1;overflow-y:auto;padding:8px 12px 16px;}
  .spot-card{
    background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;
    cursor:pointer;transition:transform .12s ease, box-shadow .12s ease;position:relative;
  }
  .spot-card:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(22,48,43,0.10);}
  .spot-card.selected{outline:2px solid var(--copper);}
  .spot-card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .spot-card h3{margin:0;font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--ink);}
  .badge{
    font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap;
    font-family:'IBM Plex Mono',monospace;letter-spacing:.3px;
  }
  .badge.easy{background:var(--easy);}
  .badge.mid{background:var(--mid);}
  .badge.hard{background:var(--hard);}
  .spot-card .meta{margin-top:6px;font-size:12.5px;color:var(--ink-soft);}
  .spot-card .fish{margin-top:6px;font-size:12px;color:var(--ink-soft);font-style:italic;}

  /* ---------- Map ---------- */
  .map-wrap{flex:1;position:relative;}
  #map{width:100%;height:100%;}
  .depth-marker{display:flex;align-items:center;justify-content:center;}
  .depth-marker .ring{border-radius:50%;position:absolute;opacity:.35;}
  .depth-marker .core{border-radius:50%;position:relative;box-shadow:0 0 0 2px #fff;}

  /* ---------- Detail panel ---------- */
  .detail-panel{
    position:absolute;top:0;right:0;height:100%;width:380px;max-width:88vw;
    background:var(--paper);border-left:1px solid var(--line);
    box-shadow:-8px 0 24px rgba(11,42,46,0.18);
    transform:translateX(100%);transition:transform .28s ease;
    display:flex;flex-direction:column;z-index:500;
  }
  .detail-panel.open{transform:translateX(0);}
  .detail-head{padding:20px 20px 14px;border-bottom:1px solid var(--line);position:relative;}
  .detail-head .close{
    position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-soft);
    line-height:1;padding:4px;
  }
  .detail-head h2{font-family:'Fraunces',serif;font-size:22px;margin:0 30px 8px 0;color:var(--ink);}
  .detail-body{flex:1;overflow-y:auto;padding:16px 20px 20px;}
  .stat-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .stat{
    background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 12px;flex:1;min-width:90px;
  }
  .stat .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px;}
  .stat .v{font-size:14px;font-weight:600;margin-top:2px;}
  .desc{font-size:13.5px;line-height:1.65;color:var(--ink);margin-bottom:16px;}
  .fish-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
  .fish-tag{background:var(--paper-2);border:1px solid var(--line);padding:4px 10px;border-radius:14px;font-size:12px;}
  .nav-btn{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    background:var(--copper);color:#fff;border:none;padding:13px;border-radius:9px;
    font-size:14.5px;font-weight:600;cursor:pointer;text-decoration:none;font-family:'IBM Plex Sans Thai',sans-serif;
    transition:background .15s ease;
  }
  .nav-btn:hover{background:var(--copper-lt);}
  .section-title{
    font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--ink-soft);margin:22px 0 10px;border-top:1px solid var(--line);padding-top:16px;
  }
  .nearby-item{
    display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#fff;
    border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer;font-size:13px;
  }
  .nearby-item:hover{border-color:var(--copper);}
  .nearby-item .dist{font-family:'IBM Plex Mono',monospace;color:var(--ink-soft);font-size:12px;}
  .empty-note{font-size:12.5px;color:var(--ink-soft);font-style:italic;}

  /* overlay for mobile */
  .overlay{position:absolute;inset:0;background:rgba(11,42,46,0.35);z-index:400;display:none;}
  .overlay.show{display:block;}

  @media (max-width:820px){
    .sidebar{position:absolute;left:0;top:0;bottom:0;z-index:450;transform:translateX(-100%);transition:transform .25s ease;}
    .sidebar.open{transform:translateX(0);}
    .body-wrap{position:relative;}
    .mobile-toggle{
      display:flex;align-items:center;gap:6px;background:var(--paper);color:var(--ink);border:none;
      padding:9px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;
    }
    .legend{display:none;}
    .detail-panel{width:100%;max-width:100%;}
  }
  @media (min-width:821px){ .mobile-toggle{display:none;} }

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:rgba(22,48,43,0.25);border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <circle cx="17" cy="17" r="16" stroke="#D98E4A" stroke-width="1" opacity="0.5"/>
        <circle cx="17" cy="17" r="11" stroke="#D98E4A" stroke-width="1" opacity="0.7"/>
        <circle cx="17" cy="17" r="6" fill="#D98E4A"/>
      </svg>
      <div>
        <h1>แผนที่จุดตกปลา</h1>
        <p>FISHING LOCATION By พัฒน์ธนิน</p>
      </div>
    </div>
    <div class="header-right">
      <button class="mobile-toggle" id="toggleSidebar">☰ รายการหมาย</button>
      <div class="legend">
        <div class="legend-item" style="color:var(--easy)"><span class="legend-dot"></span>วัดดวง</div>
        <div class="legend-item" style="color:var(--mid)"><span class="legend-dot"></span>มีบ้าง</div>
        <div class="legend-item" style="color:var(--hard)"><span class="legend-dot"></span>มหาชน</div>
      </div>
    </div>
  </header>

  <div class="body-wrap">
    <div class="overlay" id="overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="filters">
        <div class="label">กรองตามระดับ</div>
        <div class="chips">
          <div class="chip active" data-level="all">ทั้งหมด</div>
          <div class="chip" data-level="easy">วัดดวง</div>
          <div class="chip" data-level="mid">มีบ้าง</div>
          <div class="chip" data-level="hard">มหาชน</div>
        </div>
      </div>
      <div class="locate-box">
        <button class="locate-btn" id="locateBtn">📍 แสดงตำแหน่งของฉัน</button>
        <div class="locate-status" id="locateStatus"></div>
      </div>
      <div class="near-me" id="nearMeBox" style="display:none;">
        <div class="label" style="display:flex;justify-content:space-between;align-items:center;">
          <span>แนะนำใกล้ตำแหน่งของคุณ</span>
          <span id="showAllBtn" style="text-transform:none;letter-spacing:0;cursor:pointer;color:var(--copper);font-weight:600;">ดูจุดทั้งหมด</span>
        </div>
        <div id="nearMeList"></div>
      </div>
      <div class="spot-list" id="spotList"></div>
    </aside>

    <div class="map-wrap">
      <div id="map"></div>
      <div class="detail-panel" id="detailPanel">
        <div class="detail-head">
          <button class="close" id="closePanel">✕</button>
          <h2 id="dTitle">—</h2>
          <span class="badge" id="dBadge"></span>
        </div>
        <div class="detail-body">
          <div class="stat-row">
            <div class="stat"><div class="k">พิกัด</div><div class="v" id="dCoord">—</div></div>
            <div class="stat"><div class="k">ประเภทน้ำ</div><div class="v" id="dWater">—</div></div>
          </div>
          <p class="desc" id="dDesc">—</p>
          <div class="fish-tags" id="dFish"></div>
          <a class="nav-btn" id="dNavBtn" target="_blank" rel="noopener">
            📍 เปิดนำทางด้วย Google Maps
          </a>
          <div class="section-title">จุดตกปลาใกล้เคียง</div>
          <div id="dNearby"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>

    fish:['ปลาเก๋า','ปลากระเบน','ปลาสาก','ปลากุเลา','ปลกระพง','ปลาเล็ก'] },

    fish:['ปลาสาก','ปลาเล็ก'] },
  { id:14, name:'สะพานร้าง', lat:8.003245263238359, lng:100.32472263107671, level:'mid', water:'ทะเล (ชายฝั่ง)',
    desc:'ปลาหลากหลาย แต่ต้องมาช่วงน้ำขึ้น เข้าถึงยาก เดินเหนื่อย',
    fish:['ปลากระพง','ปลาเก๋า','ปลาเล็ก','ปลาขนาดกลาง'] },
  { id:15, name:'คลองหัวไทร', lat:8.019762659110707, lng:100.31381202851496, level:'mid', water:'คลอง (น้ำกร่อย)',
    desc:'*หมายลับ* ปลาหลากหลาย เข้าถึงยาก เดินเหนื่อย ต้องกระจายตก ปักเป้าเยอะมาก',
    fish:['ปลากระพง','ปลาดุก','ปลาเก๋า','ปลาเล็ก','ปลาขนาดกลาง'] },
  { id:16, name:'คลองดินแดง', lat:8.610040873947515, lng:99.59707754332555, level:'mid', water:'อ่างเก็บน้ำ (น้ำจืด)',
    desc:'ตกปลาได้หลายชนิด ต้องสำรวจให้ทั่ว',
    fish:['ปลานิล','ปลาชะโด'] },
  { id:17, name:'อ่างเก็บน้ำกะทูน', lat:8.577998671179222, lng:99.52202146385198, level:'mid', water:'อ่างเก็บน้ำ (น้ำจืด)',
    desc:'ตกปลาได้หลายชนิด ต้องสำรวจให้ทั่ว',
    fish:['ปลานิล','ปลาชะโด'] },
];

/* ---------------- State ---------------- */
let currentFilter = 'all';
let selectedId = null;
let userLoc = null;
let userMarker = null;
const markers = {};

/* ---------------- Helpers ---------------- */
function haversine(a, b){
  const R = 6371;
  const dLat = (b.lat-a.lat)*Math.PI/180;
  const dLng = (b.lng-a.lng)*Math.PI/180;
  const lat1 = a.lat*Math.PI/180, lat2 = b.lat*Math.PI/180;
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(h));
}

function panToOffset(lat, lng, xRatio=-0.15){
  const targetLatLng = L.latLng(lat, lng);
  const zoom = map.getZoom();
  const targetPoint = map.project(targetLatLng, zoom);
  const size = map.getSize();
  const newCenterPoint = L.point(targetPoint.x - xRatio * size.x, targetPoint.y);
  const newCenter = map.unproject(newCenterPoint, zoom);
  map.panTo(newCenter, { animate:true });
}

function makeDivIcon(level, active){
  const color = LEVEL_COLOR[level];
  const size = active ? 34 : 26;
  const core = active ? 14 : 10;
  return L.divIcon({
    className:'',
    html:`<div class="depth-marker" style="width:${size}px;height:${size}px;">
            <div class="ring" style="width:${size}px;height:${size}px;background:${color};"></div>
            <div class="ring" style="width:${size*0.66}px;height:${size*0.66}px;background:${color};opacity:.55;"></div>
            <div class="core" style="width:${core}px;height:${core}px;background:${color};"></div>
          </div>`,
    iconSize:[size,size],
    iconAnchor:[size/2,size/2],
  });
}

/* ---------------- Map init ---------------- */
const map = L.map('map', { zoomControl:true }).setView([8.9, 99.6], 8);

// Standard OpenStreetMap tiles
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:18,
  attribution:'&copy; OpenStreetMap contributors'
}).addTo(map);

function renderMarkers(){
  Object.values(markers).forEach(m => map.removeLayer(m));
  for (const k in markers) delete markers[k];
  spots.forEach(s => {
    if (currentFilter !== 'all' && s.level !== currentFilter) return;
    const marker = L.marker([s.lat, s.lng], { icon: makeDivIcon(s.level, s.id===selectedId) });
    marker.on('click', () => selectSpot(s.id));
    marker.addTo(map);
    markers[s.id] = marker;
  });
}

/* ---------------- Sidebar list ---------------- */
function renderList(){
  const list = document.getElementById('spotList');
  list.innerHTML = '';
  const filtered = spots.filter(s => currentFilter==='all' || s.level===currentFilter);
  if (filtered.length===0){
    list.innerHTML = '<p class="empty-note">ไม่พบจุดตกปลาในระดับนี้</p>';
    return;
  }
  filtered.forEach(s => {
    const card = document.createElement('div');
    card.className = 'spot-card' + (s.id===selectedId ? ' selected':'');
    card.innerHTML = `
      <div class="row1">
        <h3>${s.name}</h3>
        <span class="badge ${s.level}">${LEVEL_LABEL[s.level]}</span>
      </div>
      <div class="meta">${s.water}</div>
      <div class="fish">${s.fish.join(' · ')}</div>
    `;
    card.addEventListener('click', () => selectSpot(s.id));
    list.appendChild(card);
  });
}

/* ---------------- Detail panel ---------------- */
function selectSpot(id){
  selectedId = id;
  const s = spots.find(x=>x.id===id);
  if (!s) return;

  renderMarkers();
  renderList();

  document.getElementById('dTitle').textContent = s.name;
  const badge = document.getElementById('dBadge');
  badge.textContent = LEVEL_LABEL[s.level];
  badge.className = 'badge ' + s.level;
  document.getElementById('dCoord').textContent = `${s.lat.toFixed(4)}, ${s.lng.toFixed(4)}`;
  document.getElementById('dWater').textContent = s.water;
  document.getElementById('dDesc').textContent = s.desc;
  document.getElementById('dFish').innerHTML = s.fish.map(f=>`<span class="fish-tag">${f}</span>`).join('');
  document.getElementById('dNavBtn').href = `https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;

  // nearby spots (any level), sorted by distance
  const nearby = spots
    .filter(x => x.id !== s.id)
    .map(x => ({ spot:x, dist: haversine(s, x) }))
    .sort((a,b) => a.dist - b.dist)
    .slice(0, 4);

  const nearbyEl = document.getElementById('dNearby');
  if (nearby.length === 0){
    nearbyEl.innerHTML = '<p class="empty-note">ไม่มีจุดอื่นใกล้เคียง</p>';
  } else {
    nearbyEl.innerHTML = nearby.map(n => `
      <div class="nearby-item" data-id="${n.spot.id}">
        <span>${n.spot.name} <span class="badge ${n.spot.level}" style="margin-left:4px;">${LEVEL_LABEL[n.spot.level]}</span></span>
        <span class="dist">${n.dist.toFixed(1)} กม.</span>
      </div>
    `).join('');
    nearbyEl.querySelectorAll('.nearby-item').forEach(el=>{
      el.addEventListener('click', ()=> selectSpot(parseInt(el.dataset.id)));
    });
  }

  document.getElementById('detailPanel').classList.add('open');
  panToOffset(s.lat, s.lng, -0.15);
}

document.getElementById('closePanel').addEventListener('click', ()=>{
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  renderMarkers();
  renderList();
});

/* ---------------- My location ---------------- */
const locateBtn = document.getElementById('locateBtn');
const locateStatus = document.getElementById('locateStatus');
const nearMeBox = document.getElementById('nearMeBox');
const nearMeList = document.getElementById('nearMeList');
const spotListEl = document.getElementById('spotList');
const showAllBtn = document.getElementById('showAllBtn');

function renderNearMe(){
  if (!userLoc){
    nearMeBox.style.display = 'none';
    spotListEl.style.display = '';
    return;
  }
  const ranked = spots
    .map(s => ({ spot:s, dist: haversine(userLoc, s) }))
    .sort((a,b) => a.dist - b.dist)
    .slice(0, 5);

  nearMeList.innerHTML = ranked.map(r => `
    <div class="near-item" data-id="${r.spot.id}">
      <span>${r.spot.name} <span class="badge ${r.spot.level}" style="margin-left:4px;">${LEVEL_LABEL[r.spot.level]}</span></span>
      <span class="dist">${r.dist.toFixed(1)} กม.</span>
    </div>
  `).join('');
  nearMeList.querySelectorAll('.near-item').forEach(el=>{
    el.addEventListener('click', ()=> selectSpot(parseInt(el.dataset.id)));
  });

  nearMeBox.style.display = 'block';
  spotListEl.style.display = 'none';
}

showAllBtn.addEventListener('click', ()=>{
  userLoc = null;
  if (userMarker){ map.removeLayer(userMarker); userMarker = null; }
  renderNearMe();
});

function placeUserMarker(){
  if (userMarker) map.removeLayer(userMarker);
  const icon = L.divIcon({
    className:'',
    html:`<div class="user-marker"><div class="pulse"></div><div class="dot"></div></div>`,
    iconSize:[20,20],
    iconAnchor:[10,10],
  });
  userMarker = L.marker([userLoc.lat, userLoc.lng], { icon, zIndexOffset:1000 }).addTo(map);
  userMarker.bindPopup('ตำแหน่งของคุณ');
}

locateBtn.addEventListener('click', ()=>{
  if (!navigator.geolocation){
    locateStatus.textContent = 'เบราว์เซอร์นี้ไม่รองรับการระบุตำแหน่ง';
    return;
  }
  locateBtn.disabled = true;
  locateBtn.textContent = '📍 กำลังค้นหาตำแหน่ง...';
  locateStatus.textContent = '';

  navigator.geolocation.getCurrentPosition(
    (pos) => {
      userLoc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      placeUserMarker();
      map.setView([userLoc.lat, userLoc.lng], 10);
      panToOffset(userLoc.lat, userLoc.lng, -0.2);
      renderNearMe();
      locateBtn.disabled = false;
      locateBtn.textContent = '📍 อัปเดตตำแหน่งของฉัน';
      locateStatus.textContent = 'พบตำแหน่งของคุณแล้ว';
    },
    (err) => {
      locateBtn.disabled = false;
      locateBtn.textContent = '📍 แสดงตำแหน่งของฉัน';
      locateStatus.textContent = 'ไม่สามารถเข้าถึงตำแหน่งได้ กรุณาอนุญาตการเข้าถึงตำแหน่งในเบราว์เซอร์';
    },
    { enableHighAccuracy:true, timeout:10000 }
  );
});

/* ---------------- Filters ---------------- */
document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.level;
    renderMarkers();
    renderList();
  });
});

/* ---------------- Mobile sidebar toggle ---------------- */
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
document.getElementById('toggleSidebar').addEventListener('click', ()=>{
  sidebar.classList.add('open');
  overlay.classList.add('show');
});
overlay.addEventListener('click', ()=>{
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});

/* ---------------- Initial render ---------------- */
renderMarkers();
renderList();
</script>
</body>
